<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <title>Contact Form</title>
  </head>
  <body>
    <main>
      <div
        class="w-full bg-[#dff1e7ff] h-screen flex items-center justify-center overflow-y-auto"
      >
        <div
          class="container max-w-3xl h-auto mx-auto bg-white rounded-md overflow-y-auto"
        >
          <div class="content p-6">
            <h1 class="mb-5 font-bold text-2xl">Contact Us</h1>
            <!-- form -->
            <form class="contact-form">
              <!-- form group -->
              <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-2">
                <div class="first-name-div flex flex-col gap-2">
                  <label for="first-name" class="font-semibold"
                    >First Name *</label
                  >
                  <input
                    type="text"
                    name="first-name"
                    id="first-name"
                    class="px-2 py-2 rounded-md outline-none border border-[#0c7d69]"
                  />
                  <span
                    id="first-name-span"
                    class="first-name-span hidden text-red-500 font-normal text-sm"
                  ></span>
                </div>
                <div class="last-name flex flex-col gap-2">
                  <label for="last-name" class="font-semibold"
                    >Last Name *</label
                  >
                  <input
                    type="text"
                    name="last-name"
                    id="last-name"
                    class="last-name px-2 py-2 rounded-md outline-none border border-[#0c7d69]"
                  />
                  <span
                    id="last-name-span"
                    class="last-name-span hidden text-red-500 font-normal text-sm"
                  ></span>
                </div>
              </div>

              <div class="flex flex-col gap-2 mb-5">
                <label for="email" class="font-semibold">Email *</label>
                <input
                  type="email"
                  name="email"
                  id="email"
                  class="email px-2 py-2 rounded-md outline-none border border-[#0c7d69]"
                />
                <span
                  id="email-span"
                  class="email-span hidden text-red-500 font-normal text-sm"
                ></span>
              </div>
              <div class="w-full mb-2 flex flex-col gap-2">
                <label for="first-name" class="font-semibold"
                  >Query Type *</label
                >
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-2">
                  <div
                    class="query-type px-2 py-2 flex items-center jusctify-center gap-3 rounded-md outline-none border border-[#0c7d69]"
                  >
                    <input
                      type="radio"
                      name="query-type"
                      id="general-enquiry"
                      value="general-enquiry"
                      class="general-enquiry px-2 py-2 rounded-md outline-none border border-[#0c7d69]"
                    />
                    <label for="first-name" class="font-semibold"
                      >General Enquiry</label
                    >
                    <span
                      class="general-enquiry-span hidden text-red-500 font-normal text-sm"
                    ></span>
                  </div>
                  <div
                    class="px-2 py-2 flex items-center jusctify-center gap-3 rounded-md outline-none border border-[#0c7d69]"
                  >
                    <input
                      type="radio"
                      name="query-type"
                      id="support-request"
                      value="support-request"
                    />
                    <label for="first-name" class="font-semibold"
                      >Support Request</label
                    >
                  </div>
                </div>
                <span
                  id="query-type-span"
                  class="hidden text-red-500 font-normal text-sm"
                ></span>
              </div>

              <div class="flex flex-col gap-2 mb-2">
                <label for="message" class="font-semibold">Message *</label>
                <textarea
                  name="message"
                  id="message"
                  rows="4"
                  class="message px-2 py-2 rounded-md outline-none border border-[#0c7d69]"
                ></textarea>
                <span
                  id="message-span"
                  class="message-span hidden text-red-500 font-normal text-sm"
                ></span>
              </div>
              <div class="flex gap-3 mb-4 flex-col">
                <div>
                  <input type="checkbox" name="privacy" id="privacy" />
                  <label for="privacy"
                    >I hereby consent to being contacted by the team</label
                  >
                </div>
                <div class="flex items-start">
                  <span
                    id="privacy-span"
                    class="privacy-span hidden text-red-500 font-normal text-sm"
                  ></span>
                </div>
              </div>

              <!-- Submit -->
              <button
                type="submit"
                class="button w-full px-4 py-2 rounded-md bg-[#0c7d69] text-white font-semibold hover:bg-[#0a6a58]"
              >
                Submit
              </button>
            </form>
          </div>
        </div>
      </div>
    </main>
  </body>
  <script src="index.js"></script>
</html>
